projects:
  - name: Air Quality Index Forecasting using VMD-FAN Hybrid Model
    slug: aqi-forecasting-vmd-fan
    image: /images/aqi-forecasting.png
    url: https://github.com/ankithbjoseph/vmd-fan
    demo: https://norma.ncirl.ie/8677/
    demoLabel: Published Thesis
    stack:
      - Python
      - Machine Learning
      - Time-Series Forecasting
      - VMD
      - Fourier Analysis Networks
    highlights:
      - Decomposed non-stationary AQI signals with Variational Mode Decomposition (VMD) and modelled periodicity using Fourier Analysis Networks (FAN).
      - Validated generalisability across multiple Taiwan cities (MAE 0.72, MSE 1.35, RMSE 1.16).
    tags:
      - Machine Learning
      - Python
      - Time Series
      - VMD
      - FAN
      - Research
    date: "2024"
    description: Master's thesis developing a novel hybrid model combining Variational Mode Decomposition (VMD) and Fourier Analysis Networks (FAN) for accurate Air Quality Index forecasting. Achieved 1.49% MAPE on Taiwan air quality data, outperforming baseline models.
    longDescription: |
      This research project proposes a novel VMD-FAN hybrid model for forecasting Air Quality Index (AQI) time series data. The model addresses the complexity and non-stationary nature of AQI data by combining two powerful techniques:

      - Variational Mode Decomposition (VMD) for handling noise and decomposing the signal into Intrinsic Mode Functions (IMFs)
      - Fourier Analysis Networks (FAN) for capturing periodicity patterns in the data

      The model was tested on air quality data from Taiwan's Annan district, achieving impressive performance metrics: MAE of 0.72, MSE of 1.35, RMSE of 1.16, and MAPE of 1.49%. The model's generalizability was validated through extension analysis on different cities in Taiwan, demonstrating its robustness and practical applicability in environmental monitoring.
  - name: Environmental Impact on Dublin Pedestrian Footfall
    slug: dublin-pedestrian-footfall-analysis
    image: /images/dap-dashboard.png
    url: https://github.com/ankithbjoseph/TeamAA_DAP_JAN2024
    demo: https://dashboard.projectdap.ankithjoseph.com/dashboard
    demoLabel: Live Dashboard
    stack:
      - Python
      - Data Analytics
      - Data Visualization
      - Interactive Dashboard
    highlights:
      - Integrated 10+ weather variables and air-quality metrics (PM10, PM2.5, NO2, SO2) against pedestrian counts at 20+ Dublin locations.
      - Built and deployed an interactive dashboard as a 3-person team project.
    tags:
      - Data Analytics
      - Python
      - Dashboard
      - Environmental Data
      - Visualization
      - Team Project
    date: "2024"
    description: Interactive dashboard exploring the relationship between environmental factors (weather, air quality) and pedestrian footfall across 20+ Dublin city locations. Analyzed temperature, humidity, precipitation, AQI metrics, and pedestrian counter data.
    longDescription: |
      A collaborative Data Analytics Project (DAP) that investigates how environmental conditions influence pedestrian movement patterns in Dublin city. The project features an interactive dashboard built to visualize and analyze:

      - Environmental variables: Temperature, relative humidity, dew point, apparent temperature, precipitation, rain, snowfall, cloud cover, wind speed, and sunshine duration
      - Air Quality metrics: PM10, PM2.5, Carbon Monoxide, Nitrogen Dioxide, Sulphur Dioxide, Dust concentrations, and European Air Quality Index (AQI) calculations
      - Pedestrian counter data from 20+ strategic Dublin locations including Grafton Street, O'Connell Street, College Green, and Grand Canal areas

      The dashboard enables users to explore relationships between variables, analyze distribution patterns, and understand how weather and air quality impact urban pedestrian activity. Built as a team project with Alphons Zacharia James and Abhilash Janardhanan.
